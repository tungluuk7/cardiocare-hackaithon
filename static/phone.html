<html class="light" lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>CardioCare — Điện thoại</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: { extend: {
        colors: {
            "on-surface-variant": "#434655", "secondary-fixed": "#dae2fd",
            "outline-variant": "#c3c6d7", "on-error-container": "#93000a",
            "on-surface": "#191c1e", "error": "#FB2C36",
            "surface-container-low": "#f2f4f6", "surface": "#f7f9fb",
            "surface-container": "#eceef0", "primary": "#004ac6",
            "on-primary": "#ffffff", "on-surface": "#191c1e",
            "outline": "#737686", "on-secondary-container": "#5c647a",
            "tertiary": "#00BC7D", "background": "#f7f9fb",
            "risk-yellow": "#FE9A00",
        },
        fontFamily: { "body-md": ["Inter"] },
    }}
};
</script>
<style>
body { font-family: 'Inter', sans-serif; background: #e8eaed; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
.phone-frame { width: 393px; height: 852px; background: white; border-radius: 44px; box-shadow: 0 20px 60px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; position: relative; }
.phone-notch { width: 150px; height: 30px; background: #1a1a1a; border-radius: 0 0 18px 18px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; }
.status-bar { padding: 14px 28px 8px; display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #1a1a1a; position: relative; z-index: 5; }
.chat-header { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 12px; background: white; }
.chat-header a { color: #004ac6; text-decoration: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.chat-header a:hover { color: #2563eb; }
.chat-avatar { width: 36px; height: 36px; border-radius: 50%; background: #004ac6; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
.chat-contact { flex: 1; }
.chat-contact h2 { font-size: 15px; font-weight: 700; margin: 0; color: #191c1e; }
.chat-contact p { font-size: 11px; color: #737686; margin: 0; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #f7f9fb; }
.msg-bot { align-self: flex-start; background: white; border: 1px solid #e5e7eb; border-radius: 18px 18px 18px 4px; padding: 10px 16px; max-width: 82%; font-size: 14px; line-height: 1.5; color: #191c1e; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.msg-user { align-self: flex-end; background: #004ac6; color: white; border-radius: 18px 18px 4px 18px; padding: 10px 16px; max-width: 82%; font-size: 14px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.msg-time { font-size: 10px; color: #9ca3af; margin-top: 4px; text-align: right; }
.triage-bar { margin: 0 12px 8px; padding: 10px 14px; border-radius: 12px; display: none; align-items: center; justify-content: space-between; }
.triage-bar.show { display: flex; }
.triage-bar.red { background: #FB2C36; }
.triage-bar.yellow { background: #FE9A00; }
.triage-bar .text { color: white; font-size: 12px; font-weight: 600; flex: 1; margin-left: 8px; }
.triage-bar button { background: rgba(255,255,255,0.25); border: none; color: white; font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
.triage-bar button:hover { background: rgba(255,255,255,0.4); }
.triage-bar button:disabled { opacity: 0.5; cursor: default; }
.chat-input-area { padding: 8px 12px 12px; border-top: 1px solid #e5e7eb; background: white; display: flex; align-items: center; gap: 8px; }
.chat-input-area input { flex: 1; border: 1px solid #e5e7eb; border-radius: 20px; padding: 9px 16px; font-size: 14px; outline: none; }
.chat-input-area input:focus { border-color: #004ac6; }
.chat-input-area button.send { width: 38px; height: 38px; border-radius: 50%; background: #004ac6; color: white; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.15s; }
        .chat-input-area button.mic { width: 38px; height: 38px; border-radius: 50%; background: transparent; color: #737686; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .chat-input-area button.mic:hover { background: #f3f4f6; }
        .chat-input-area button.mic.recording { background: #FB2C36; color: white; animation: pulse-record 1.2s ease-in-out infinite; }
        @keyframes pulse-record { 0%, 100% { box-shadow: 0 0 0 0 rgba(251,44,54,0.4); } 50% { box-shadow: 0 0 0 8px rgba(251,44,54,0); } }
        .chat-input-area button.send:hover { transform: scale(1.05); }
        .chat-input-area button.send:active { transform: scale(0.95); }
.home-indicator { width: 134px; height: 5px; background: #d4d4d4; border-radius: 99px; margin: 8px auto; }
.patient-select-bar { padding: 8px 16px; background: #f3f4f6; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #737686; }
.patient-select-bar select { flex: 1; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 10px; font-size: 13px; background: white; }
.connecting-msg { align-self: center; color: #9ca3af; font-size: 13px; padding: 40px 0; text-align: center; }
</style>
</head>
<body>

<div class="phone-frame">
    <div class="phone-notch"></div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span>9:41</span>
        <span>
            <span class="material-symbols-outlined text-[14px]" data-icon="signal_cellular_alt">signal_cellular_alt</span>
            <span class="material-symbols-outlined text-[14px]" data-icon="wifi">wifi</span>
            <span class="material-symbols-outlined text-[14px]" data-icon="battery_full">battery_full</span>
        </span>
    </div>

    <!-- Patient Select Bar -->
    <div class="patient-select-bar">
        <span class="material-symbols-outlined text-[18px]" data-icon="person">person</span>
        <select id="phonePatientSelect">
            <option value="">Chọn bệnh nhân...</option>
        </select>
    </div>

    <!-- Chat Header -->
    <div class="chat-header">
        <a href="/static/index.html">
            <span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
            Dashboard
        </a>
        <div class="chat-avatar">
            <span class="material-symbols-outlined" data-icon="monitor_heart" style="font-variation-settings:'FILL'1;">monitor_heart</span>
        </div>
        <div class="chat-contact">
            <h2 id="phoneContactName">Trợ lý CardioCare</h2>
            <p id="phoneContactStatus">Đang trực tuyến</p>
        </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="phoneMessages">
        <div class="connecting-msg">
            <span class="material-symbols-outlined text-3xl block mb-2" data-icon="chat">chat</span>
            Đang kết nối...
        </div>
    </div>

    <!-- Triage Bar -->
    <div class="triage-bar" id="phoneTriageBar">
        <span class="material-symbols-outlined text-white text-lg" data-icon="warning">warning</span>
        <span class="text" id="phoneTriageText"></span>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
        <button class="mic" id="phoneMic">
            <span class="material-symbols-outlined text-xl" data-icon="mic">mic</span>
        </button>
        <input id="phoneInput" type="text" placeholder="Nhập tin nhắn..." autocomplete="off"/>
        <button class="send" id="phoneSend">
            <span class="material-symbols-outlined text-xl" data-icon="send">send</span>
        </button>
    </div>

    <!-- Home Indicator -->
    <div class="home-indicator"></div>
</div>

<script>
var SYMPTOM_LABELS = {
    "dau_nguc": "Đau ngực", "ngat": "Ngất", "chay_mau": "Chảy máu vết thương",
    "kho_tho": "Khó thở", "chong_mat": "Chóng mặt", "phu_chan": "Phù chân",
    "hoi_hop": "Hồi hộp", "sot": "Sốt"
};

var chatSessionId = 'phone_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
var chatTurn = 0;
var chatLevel = 'GREEN';
var chatSymptoms = [];
var chatSymptomLabels = [];
var chatPatientId = null;
var chatStarted = false;

function appendMessage(text, isUser) {
    var container = document.getElementById('phoneMessages');
    var div = document.createElement('div');
    div.className = isUser ? 'msg-user' : 'msg-bot';
    var p = document.createElement('p');
    p.style.margin = '0';
    p.textContent = text;
    div.appendChild(p);
    var time = document.createElement('div');
    time.className = 'msg-time';
    var now = new Date();
    time.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    div.appendChild(time);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function updateTriage() {
    var bar = document.getElementById('phoneTriageBar');
    var text = document.getElementById('phoneTriageText');
    bar.classList.remove('show', 'red', 'yellow');

    if (chatLevel === 'RED') {
        bar.classList.add('show', 'red');
        text.textContent = 'KHẨN CẤP: ' + (chatSymptomLabels.join(', ') || 'có triệu chứng nguy hiểm');
    } else if (chatLevel === 'YELLOW') {
        bar.classList.add('show', 'yellow');
        text.textContent = 'THEO DÕI: ' + (chatSymptomLabels.join(', ') || 'có triệu chứng');
    } else {
        bar.classList.remove('show');
    }
}

function loadPatientOptions() {
    var select = document.getElementById('phonePatientSelect');
    fetch('/patients')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            select.innerHTML = '<option value="">Chọn bệnh nhân...</option>';
            data.forEach(function(p) {
                var opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name + (p.age ? ' (' + p.age + ' tuổi)' : '');
                select.appendChild(opt);
            });
            var urlId = new URLSearchParams(window.location.search).get('id');
            if (urlId) {
                select.value = urlId;
                chatPatientId = parseInt(urlId);
            }
            updateContactName();
        })
        .catch(function() {});
}

function updateContactName() {
    var h2 = document.getElementById('phoneContactName');
    var status = document.getElementById('phoneContactStatus');
    if (chatPatientId) {
        var select = document.getElementById('phonePatientSelect');
        var name = select.options[select.selectedIndex]?.text || 'Bệnh nhân';
        h2.textContent = name;
        status.textContent = 'Bệnh nhân tim mạch';
    } else {
        h2.textContent = 'Trợ lý CardioCare';
        status.textContent = 'Đang trực tuyến';
    }
}

function initChat() {
    var container = document.getElementById('phoneMessages');
    container.innerHTML = '';

    fetch('/chatbot/opening')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            chatStarted = true;
            appendMessage(data.reply, false);
        })
        .catch(function() {
            chatStarted = true;
            appendMessage('Cháu chào bác ạ! Cháu là trợ lý CardioCare, gọi hỏi thăm sức khỏe bác hôm nay. Bác thấy trong người thế nào ạ?', false);
        });
}

function sendMessage() {
    var input = document.getElementById('phoneInput');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';

    if (!chatStarted) {
        var container = document.getElementById('phoneMessages');
        container.innerHTML = '';
        chatStarted = true;
    }

    appendMessage(text, true);

    fetch('/chatbot/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            message: text,
            session_id: chatSessionId,
            patient_id: chatPatientId
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        appendMessage(data.reply, false);
        chatTurn = data.turn || 0;
        chatLevel = data.triage_level || 'GREEN';
        chatSymptoms = data.symptoms || [];
        chatSymptomLabels = data.symptom_labels || [];
        updateTriage();
    })
    .catch(function() {
        appendMessage('Xin lỗi, cháu chưa nghe rõ. Bác nói lại giúp cháu nhé!', false);
    });
}

document.getElementById('phoneSend').addEventListener('click', sendMessage);
document.getElementById('phoneInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMessage();
});

var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;

document.getElementById('phoneMic').addEventListener('click', function() {
    if (isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        this.classList.remove('recording');
        this.querySelector('span').textContent = 'mic';
        this.querySelector('span').dataset.icon = 'mic';
        return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        appendMessage('Trình duyệt không hỗ trợ ghi âm.', false);
        return;
    }

    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            audioChunks = [];

            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = function() {
                stream.getTracks().forEach(function(t) { t.stop(); });
                var blob = new Blob(audioChunks, { type: 'audio/webm' });
                sendAudio(blob);
            };

            mediaRecorder.start();
            isRecording = true;
            var btn = document.getElementById('phoneMic');
            btn.classList.add('recording');
            btn.querySelector('span').textContent = 'stop';
            btn.querySelector('span').dataset.icon = 'stop';
        })
        .catch(function() {
            appendMessage('Không thể truy cập micro. Vui lòng kiểm tra quyền.', false);
        });
});

function sendAudio(blob) {
    var input = document.getElementById('phoneInput');
    input.placeholder = 'Đang xử lý giọng nói...';
    input.disabled = true;

    var formData = new FormData();
    formData.append('audio', blob, 'recording.webm');

    fetch('/chatbot/transcribe', {
        method: 'POST',
        body: formData
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var text = (data.text || '').trim();
        input.placeholder = 'Nhập tin nhắn...';
        input.disabled = false;
        if (!text) {
            appendMessage('Cháu chưa nghe rõ. Bác nói lại giúp cháu nhé!', false);
            return;
        }
        appendMessage(text, true);
        fetch('/chatbot/message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: text,
                session_id: chatSessionId,
                patient_id: chatPatientId
            })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            appendMessage(data.reply, false);
            chatTurn = data.turn || 0;
            chatLevel = data.triage_level || 'GREEN';
            chatSymptoms = data.symptoms || [];
            chatSymptomLabels = data.symptom_labels || [];
            updateTriage();
        })
        .catch(function() {
            appendMessage('Xin lỗi, cháu chưa nghe rõ. Bác nói lại giúp cháu nhé!', false);
        });
    })
    .catch(function() {
        input.placeholder = 'Nhập tin nhắn...';
        input.disabled = false;
        appendMessage('Lỗi xử lý giọng nói. Vui lòng thử lại.', false);
    });
}

document.getElementById('phonePatientSelect').addEventListener('change', function() {
    var val = this.value;
    chatPatientId = val ? parseInt(val) : null;
    updateContactName();
});

// alert removed — patient shouldn't send warning to themselves

loadPatientOptions();
initChat();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardioCare — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: .45 } }
    .blink { animation: blink 1s ease-in-out infinite }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">❤️</span>
      <h1 class="text-xl font-bold text-gray-800">CardioCare</h1>
      <span class="text-sm text-gray-400">Theo dõi bệnh nhân sau xuất viện</span>
      <span id="tel-mode" class="hidden text-xs px-2 py-1 rounded-full"></span>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="runScheduledNow()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-emerald-700">
        ▶ Chạy vòng gọi ngay
      </button>
      <button onclick="openDemo()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">
        + Gọi kiểm tra
      </button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <!-- Alerts banner (real-time) -->
    <div id="alerts-banner" class="space-y-2 mb-6"></div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-xl p-4 border text-center">
        <div id="count-all" class="text-3xl font-bold text-gray-800">—</div>
        <div class="text-sm text-gray-500 mt-1">Tổng bệnh nhân</div>
      </div>
      <div class="bg-yellow-50 rounded-xl p-4 border border-yellow-200 text-center">
        <div id="count-yellow" class="text-3xl font-bold text-yellow-600">—</div>
        <div class="text-sm text-yellow-600 mt-1">Cần theo dõi</div>
      </div>
      <div class="bg-red-50 rounded-xl p-4 border border-red-200 text-center">
        <div id="count-red" class="text-3xl font-bold text-red-600">—</div>
        <div class="text-sm text-red-600 mt-1">Khẩn cấp</div>
      </div>
    </div>

    <!-- Patient table -->
    <div class="bg-white rounded-xl border overflow-hidden">
      <div class="px-6 py-4 border-b">
        <h2 class="font-semibold text-gray-700">Danh sách bệnh nhân</h2>
      </div>
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
          <tr>
            <th class="px-6 py-3 text-left">Bệnh nhân</th>
            <th class="px-6 py-3 text-left">Điện thoại</th>
            <th class="px-6 py-3 text-left">Tình trạng</th>
            <th class="px-6 py-3 text-left">Triệu chứng</th>
            <th class="px-6 py-3 text-left">Lần gọi cuối</th>
            <th class="px-6 py-3"></th>
          </tr>
        </thead>
        <tbody id="patient-table" class="divide-y divide-gray-100">
          <tr><td colspan="6" class="px-6 py-8 text-center text-gray-400">Đang tải...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Demo Modal -->
  <div id="demo-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-xl">
      <h2 class="text-lg font-bold mb-4">Gọi kiểm tra bệnh nhân</h2>

      <label class="block text-sm text-gray-600 mb-1">Chọn bệnh nhân</label>
      <select id="select-patient" class="w-full border rounded-lg px-3 py-2 mb-4 text-sm"></select>

      <label class="block text-sm text-gray-600 mb-1">Upload audio trả lời (hoặc chọn demo)</label>
      <input type="file" id="audio-file" accept="audio/*" class="w-full border rounded-lg px-3 py-2 mb-3 text-sm">

      <div class="flex gap-2 mb-4">
        <button onclick="runDemo('green')"  class="flex-1 py-2 rounded-lg bg-green-100 text-green-700 text-sm hover:bg-green-200">Demo GREEN</button>
        <button onclick="runDemo('yellow')" class="flex-1 py-2 rounded-lg bg-yellow-100 text-yellow-700 text-sm hover:bg-yellow-200">Demo YELLOW</button>
        <button onclick="runDemo('red')"    class="flex-1 py-2 rounded-lg bg-red-100 text-red-700 text-sm hover:bg-red-200">Demo RED</button>
      </div>

      <div id="demo-result" class="hidden rounded-xl p-4 mb-4 text-sm"></div>

      <div class="flex gap-2 justify-end">
        <button onclick="closeDemo()" class="px-4 py-2 rounded-lg border text-sm">Đóng</button>
        <button onclick="submitCall()" class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700">Gọi thật</button>
      </div>
    </div>
  </div>

  <!-- Callback Modal (voicebot gọi lại) -->
  <div id="callback-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-xl">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-2xl">📞</span>
        <h2 class="text-lg font-bold">Voicebot đang gọi lại bệnh nhân</h2>
      </div>
      <div id="callback-patient" class="text-sm text-gray-500 mb-3"></div>
      <div id="callback-message" class="bg-blue-50 text-blue-900 rounded-xl p-4 text-sm leading-relaxed mb-4"></div>
      <audio id="callback-audio" controls autoplay class="w-full mb-4"></audio>
      <div class="flex justify-end">
        <button onclick="closeCallback()" class="px-4 py-2 rounded-lg border text-sm">Đóng</button>
      </div>
    </div>
  </div>

<script>
const LEVEL_CONFIG = {
  RED:    { bg: 'bg-red-100',    text: 'text-red-700',    label: '🔴 KHẨN CẤP' },
  YELLOW: { bg: 'bg-yellow-100', text: 'text-yellow-700', label: '🟡 THEO DÕI' },
  GREEN:  { bg: 'bg-green-100',  text: 'text-green-700',  label: '🟢 BÌNH THƯỜNG' },
};

// ── Dashboard ────────────────────────────────────────────────────────────────
async function loadDashboard() {
  const res  = await fetch('/dashboard');
  const data = await res.json();

  document.getElementById('count-all').textContent    = data.length;
  document.getElementById('count-yellow').textContent = data.filter(p => p.level === 'YELLOW').length;
  document.getElementById('count-red').textContent    = data.filter(p => p.level === 'RED').length;

  const tbody = document.getElementById('patient-table');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-gray-400">Chưa có bệnh nhân nào</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(p => {
    const cfg   = LEVEL_CONFIG[p.level] || { bg: 'bg-gray-100', text: 'text-gray-500', label: '—' };
    const syms  = Array.isArray(p.symptoms) ? p.symptoms.join(', ') : (p.symptoms || '—');
    const answered = p.last_answered_at || p.last_call_at;
    const when  = answered ? new Date(answered.replace(' ', 'T')).toLocaleString('vi-VN') : 'Chưa nhấc máy';
    const canCallback = p.level === 'RED' || p.level === 'YELLOW';
    return `
      <tr class="hover:bg-gray-50">
        <td class="px-6 py-4 font-medium">${p.name}</td>
        <td class="px-6 py-4 text-gray-500">${p.phone}</td>
        <td class="px-6 py-4">
          <span class="px-2 py-1 rounded-full text-xs font-medium ${cfg.bg} ${cfg.text}">${cfg.label}</span>
        </td>
        <td class="px-6 py-4 text-gray-500">${syms}</td>
        <td class="px-6 py-4 text-gray-400 text-xs">${when}</td>
        <td class="px-6 py-4 whitespace-nowrap">
          <button onclick="quickCall(${p.id})" class="text-blue-600 hover:underline text-xs">Kiểm tra</button>
          <button onclick="phoneCall(${p.id}, this)" class="ml-3 text-emerald-600 hover:underline text-xs">📲 Gọi điện${p.call_time ? ` (${p.call_time})` : ''}</button>
          <button onclick="setSchedule(${p.id})" class="ml-3 text-gray-500 hover:underline text-xs">📅 Hẹn giờ</button>
          ${canCallback ? `<button onclick="playCallback(${p.id}, this)" class="ml-3 text-red-600 hover:underline text-xs">📞 Gọi lại</button>` : ''}
          <button onclick="deletePatient(${p.id}, '${(p.name||'').replace(/'/g, '')}')" class="ml-3 text-gray-400 hover:text-red-600 hover:underline text-xs">🗑 Xóa</button>
        </td>
      </tr>`;
  }).join('');
}

async function deletePatient(patientId, name) {
  if (!confirm(`Xóa bệnh nhân "${name}" và toàn bộ lịch sử gọi?`)) return;
  const r = await fetch(`/patients/${patientId}`, { method: 'DELETE' });
  if (r.ok) { loadDashboard(); loadAlerts(); }
  else { const e = await r.json().catch(()=>({})); alert('Lỗi xóa: ' + (e.detail || r.status)); }
}

// ── Telephony: gọi điện thật / mô phỏng ──────────────────────────────────────
async function loadTelMode() {
  try {
    const s = await (await fetch('/telephony/status')).json();
    const el = document.getElementById('tel-mode');
    if (s.mode === 'real') {
      el.textContent = '📞 Gọi thật (Stringee)';
      el.className = 'text-xs px-2 py-1 rounded-full bg-emerald-100 text-emerald-700';
    } else {
      el.textContent = '🧪 Chế độ mô phỏng';
      el.className = 'text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500';
    }
    el.classList.remove('hidden');
  } catch {}
}

async function phoneCall(patientId, btn) {
  const original = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = 'Đang gọi...'; }
  try {
    const r = await fetch(`/telephony/call/${patientId}`, { method: 'POST' });
    const d = await r.json();
    if (d.mode === 'real') {
      alert(d.ok ? '📞 Đã khởi tạo cuộc gọi thật! Điện thoại bệnh nhân sẽ reo.'
                 : 'Gọi thất bại: ' + (d.error || d.body || 'lỗi không rõ'));
    } else {
      alert(`🧪 Mô phỏng cuộc gọi → kết quả: ${d.level}\n"${d.transcript}"\n\n(Cấu hình Stringee trong .env để gọi thật)`);
    }
    loadDashboard(); loadAlerts();
  } catch (e) {
    alert('Lỗi: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = original; }
  }
}

async function setSchedule(patientId) {
  const t = prompt('Cài giờ gọi tự động hằng ngày (HH:MM), vd 09:00:', '09:00');
  if (!t) return;
  const r = await fetch(`/telephony/schedule/${patientId}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ call_time: t })
  });
  if (r.ok) { alert(`✅ Đã hẹn gọi lúc ${t} hằng ngày.`); loadDashboard(); }
  else { const e = await r.json().catch(()=>({})); alert('Lỗi: ' + (e.detail || 'không hợp lệ')); }
}

async function runScheduledNow() {
  const r = await fetch('/telephony/run-now', { method: 'POST' });
  const d = await r.json();
  if (!d.called) alert('Không có bệnh nhân nào tới giờ hẹn ngay lúc này.\n(Dùng "📲 Gọi điện" để gọi 1 người ngay, hoặc "📅 Hẹn giờ" đặt đúng giờ hiện tại.)');
  else alert(`▶ Đã chạy vòng gọi: ${d.called} bệnh nhân.`);
  loadDashboard(); loadAlerts();
}

// ── Alerts banner (real-time) ────────────────────────────────────────────────
async function loadAlerts() {
  let data = [];
  try { data = await (await fetch('/alerts')).json(); } catch { return; }

  const unseen = data.filter(a => !a.seen);
  const banner = document.getElementById('alerts-banner');
  if (!unseen.length) { banner.innerHTML = ''; return; }

  banner.innerHTML = unseen.map(a => {
    const isRed = a.level === 'RED';
    const cls   = isRed ? 'bg-red-600 text-white blink' : 'bg-yellow-400 text-yellow-900';
    const syms  = Array.isArray(a.symptoms) ? a.symptoms.join(', ') : (a.symptoms || '');
    return `
      <div class="${cls} rounded-xl px-5 py-3 flex items-center justify-between shadow">
        <div class="flex items-center gap-3">
          <span class="text-xl">${isRed ? '🚨' : '⚠️'}</span>
          <div>
            <div class="font-bold">${isRed ? 'KHẨN CẤP' : 'CẦN THEO DÕI'} — ${a.patient_name}</div>
            <div class="text-sm opacity-90">${syms || a.message || ''}</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="playCallback(${a.patient_id}, this)"
                  class="bg-white/90 text-gray-800 text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-white">
            📞 Gọi lại
          </button>
          <button onclick="markSeen(${a.id})"
                  class="bg-black/20 text-xs px-3 py-1.5 rounded-lg hover:bg-black/30">
            Đã xem
          </button>
        </div>
      </div>`;
  }).join('');
}

async function markSeen(alertId) {
  await fetch(`/alerts/${alertId}/seen`, { method: 'POST' });
  loadAlerts();
}

// ── Voicebot callback ────────────────────────────────────────────────────────
async function playCallback(patientId, btn) {
  const original = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = 'Đang tạo giọng nói...'; }
  try {
    const res = await fetch(`/calls/${patientId}/callback`, { method: 'POST' });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.detail || 'Không tạo được lời nhắn');
    }
    const data = await res.json();
    document.getElementById('callback-patient').textContent =
      `${data.patient_name} · ${data.phone} · ${LEVEL_CONFIG[data.level]?.label || data.level}`;
    document.getElementById('callback-message').textContent = data.message;
    const audio = document.getElementById('callback-audio');
    audio.src = data.audio_url + '?t=' + Date.now();   // tránh cache
    document.getElementById('callback-modal').classList.remove('hidden');
    audio.play().catch(() => {});   // user đã bấm nút nên autoplay được phép
  } catch (e) {
    alert('Lỗi gọi lại: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = original; }
  }
}

function closeCallback() {
  const audio = document.getElementById('callback-audio');
  audio.pause();
  document.getElementById('callback-modal').classList.add('hidden');
}

// ── Demo modal ───────────────────────────────────────────────────────────────
async function openDemo() {
  const res  = await fetch('/patients');
  const list = await res.json();
  const sel  = document.getElementById('select-patient');
  sel.innerHTML = list.map(p => `<option value="${p.id}">${p.name} — ${p.phone}</option>`).join('');
  document.getElementById('demo-modal').classList.remove('hidden');
}

function closeDemo() {
  document.getElementById('demo-modal').classList.add('hidden');
  document.getElementById('demo-result').classList.add('hidden');
}

async function runDemo(scenario) {
  const patientId = document.getElementById('select-patient').value;
  if (!patientId) return alert('Chọn bệnh nhân trước');

  const fd = new FormData();
  fd.append('patient_id', patientId);
  fd.append('scenario', scenario);

  const res    = await fetch('/calls/simulate', { method: 'POST', body: fd });
  const result = await res.json();
  showResult(result);
  loadDashboard();
  loadAlerts();
}

async function submitCall() {
  const patientId = document.getElementById('select-patient').value;
  const file      = document.getElementById('audio-file').files[0];
  if (!patientId) return alert('Chọn bệnh nhân trước');

  const fd = new FormData();
  fd.append('patient_id', patientId);
  if (file) fd.append('audio_file', file);

  const res    = await fetch('/calls/simulate', { method: 'POST', body: fd });
  const result = await res.json();
  showResult(result);
  loadDashboard();
  loadAlerts();
}

function quickCall(patientId) {
  openDemo().then(() => {
    document.getElementById('select-patient').value = patientId;
  });
}

function showResult(r) {
  const cfg = LEVEL_CONFIG[r.level] || {};
  const el  = document.getElementById('demo-result');
  el.className = `rounded-xl p-4 mb-4 text-sm ${cfg.bg} ${cfg.text}`;
  el.innerHTML = `
    <div class="font-bold text-base mb-1">${cfg.label}</div>
    <div class="mb-1"><b>Transcript:</b> ${r.transcript}</div>
    <div class="mb-1"><b>Triệu chứng:</b> ${r.symptom_labels?.join(', ') || 'Không phát hiện'}</div>
    <div>${r.message}</div>
    ${r.alert_sent ? '<div class="mt-2 text-xs opacity-70">🔔 Đã tạo cảnh báo cho điều dưỡng</div>' : ''}
    ${r.callback_available ? `<button onclick="playCallback(${document.getElementById('select-patient').value}, this)"
        class="mt-3 w-full py-2 rounded-lg bg-white/80 text-gray-800 font-medium hover:bg-white">
        📞 Voicebot gọi lại bệnh nhân ngay
      </button>` : ''}
  `;
  el.classList.remove('hidden');
}

// ── Khởi động + auto refresh ──────────────────────────────────────────────────
loadTelMode();
loadDashboard();
loadAlerts();
setInterval(loadDashboard, 10000);   // bệnh nhân: 10s
setInterval(loadAlerts, 5000);       // cảnh báo: 5s (real-time hơn)
</script>
</body>
</html>

# Chạy CardioCare chỉ với 1 lệnh:
#     docker compose up --build
# Rồi mở:  http://localhost:8000/static/index.html
services:
  cardiocare:
    build: .
    container_name: cardiocare
    ports:
      - "8000:8000"
    # .env tự được nạp: Dockerfile COPY toàn bộ mã (kể cả .env nếu có) vào image,
    # và config.py gọi load_dotenv() lúc khởi động → bật VNPT/Twilio/Telegram khi có khóa.
    # Không có .env vẫn chạy bình thường ở chế độ fallback (đủ để demo).
    # (Không dùng 'env_file' để tương thích MỌI phiên bản Docker Compose, kể cả bản cũ.)
    # Seed dữ liệu bệnh nhân mẫu rồi khởi động, để dashboard có sẵn ca demo.
    command: sh -c "python seed_demo.py --reset || true; uvicorn main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
